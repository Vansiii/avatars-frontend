<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/logo-tvu.jpg" />
    <title>TVU Studio · Canal 11 UAGRM</title>
    <script>
      // Fija data-theme ANTES del primer paint para evitar el flash de tema incorrecto.
      // Lee la misma clave que usa el store de zustand (persist) en localStorage.
      (function () {
        try {
          var raw = localStorage.getItem("avatares-theme");
          var theme = raw ? JSON.parse(raw).state.theme : null;
          if (theme !== "light" && theme !== "dark") {
            theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
